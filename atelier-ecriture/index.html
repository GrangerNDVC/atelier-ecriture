<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Atelier d'Écriture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #2c3e50; --accent: #3498db; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--main); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: var(--main); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .screen { display: none; }
        .screen.active { display: block; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 20px; width: 100%; }
        #chat { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 20px; background: #fafafa; }
        .msg { margin-bottom: 15px; padding: 10px 15px; border-radius: 10px; line-height: 1.5; }
        .msg.ia { background: #e8f4fd; border-left: 4px solid var(--accent); }
        .msg.user { background: #f0f0f0; text-align: right; }
        .dys-badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-setup" class="screen active">
        <h1>Mon Atelier d'Écriture</h1>
        <label>Choisis un pseudo (correct et respectueux) :</label>
        <input type="text" id="username" placeholder="Ex: EcrivainDu33">
        
        <label>Niveau scolaire :</label>
        <select id="level">
            <option value="6eme">6ème (Le monstre, aux limites de l'humain)</option>
            <option value="5eme">5ème (Le voyage et l'aventure)</option>
            <option value="4eme">4ème (Dire l'amour / La fiction pour interroger le réel)</option>
            <option value="3eme">3ème (Se raconter, se représenter / Dénoncer les travers de la société)</option>
        </select>

        <label>Profil spécifique :</label>
        <select id="dys">
            <option value="non">Pas de profil particulier</option>
            <option value="oui">Profil DYS (Dyslexie / Dysorthographie)</option>
        </select>

        <button class="btn" onclick="initSession()">Entrer dans l'atelier</button>
    </div>

    <div id="screen-atelier" class="screen">
        <h1 id="title-atelier">Mon Atelier d'Écriture</h1>
        <div id="chat"></div>
        <textarea id="user-input" placeholder="Écris ton texte ici..."></textarea>
        <button class="btn" id="send-btn" onclick="sendToIA()">Envoyer mon travail</button>
        <button class="btn" style="background:#95a5a6;" onclick="reset()">Changer de session</button>
    </div>
</div>

<script>
let state = { username: "", level: "", dys: false, history: [] };

function initSession() {
    const user = document.getElementById('username').value.trim();
    // Filtrage basique des pseudos tendancieux
    const forbidden = ["sex", "pdp", "insulte", "con"]; 
    if(!user || forbidden.some(word => user.toLowerCase().includes(word))) {
        alert("Merci de choisir un pseudo correct."); return;
    }

    state.username = user;
    state.level = document.getElementById('level').value;
    state.dys = document.getElementById('dys').value === "oui";
    
    document.getElementById('screen-setup').classList.remove('active');
    document.getElementById('screen-atelier').classList.add('active');
    
    const intro = `Bonjour ${state.username}. Je suis ton assistant d'écriture. Je vais t'aider à progresser en français en fonction de ton niveau (${state.level}). ${state.dys ? '<span class="dys-badge">Profil DYS activé</span>' : ''}<br><br>Pour commencer, je vais évaluer tes besoins. Choisis un exercice :<br>1. **Description** (un paysage, un personnage)<br>2. **Récit** (une action courte)<br>3. **Dialogue** (deux personnes discutent)`;
    addMsg(intro, 'ia');
}

async function sendToIA() {
    const input = document.getElementById('user-input').value.trim();
    if(!input) return;

    addMsg(input, 'user');
    document.getElementById('user-input').value = "";
    document.getElementById('send-btn').disabled = true;

    // Construction du prompt avec les consignes officielles
    const systemPrompt = `Tu es un assistant pédagogique expert en français (niveau collège). 
    L'élève s'appelle ${state.username}, est en classe de ${state.level}. 
    Profil DYS : ${state.dys ? 'OUI (sois très tolérant sur l\'orthographe et la syntaxe, privilégie le fond et la structure)' : 'NON'}.
    Objectif : Évaluer la syntaxe, le vocabulaire et la ponctuation. 
    Après l'évaluation initiale, oriente l'élève vers un récit lié au programme de ${state.level}.
    Adapte tes exigences : un élève de 6ème n'a pas les mêmes attendus qu'un élève de 3ème.
    Sois encourageant, précis et utilise le jargon pédagogique approprié (connecteurs logiques, champs lexicaux, etc.).`;

    try {
        const response = await fetch('/.netlify/functions/gemini', {
            method: 'POST',
            body: JSON.stringify({
                _messages: [
                    { role: "system", content: systemPrompt },
                    ...state.history,
                    { role: "user", content: input }
                ]
            })
        });

        const data = await response.json();
        const reply = data.answer || "Désolé, j'ai une petite erreur technique.";
        addMsg(reply, 'ia');
        state.history.push({ role: "user", content: input }, { role: "assistant", content: reply });
        localStorage.setItem('atelier_' + state.username, JSON.stringify(state));
    } catch (e) {
        addMsg("Erreur de connexion aux clés API.", 'ia');
    } finally {
        document.getElementById('send-btn').disabled = false;
    }
}

function addMsg(txt, side) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${side}`;
    div.innerHTML = txt;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function reset() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
