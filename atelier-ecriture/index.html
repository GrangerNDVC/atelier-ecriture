<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mon Professeur d'Écriture — Mme Granger</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet"/>
    <style>
        /* === STYLE DE BASE === */
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{min-height:100vh;font-family:'Nunito',sans-serif;background:#f8f5ef;color:#2d2416;overflow-x:hidden}
        :root{--g:#1a7a58;--gl:#e6f7f0;--gm:#9fd8c0;--gd:#0f5a3e;--a:#c77d1a;--al:#fef3e2;--r:#c0392b;--rl:#fdecea;--b:#1a5c9e;--bl:#e8f0fb;--s:#fff;--bd:#e8dece;--bd2:#d0c4b4;--t2:#6b5b47;--t3:#9e8c78;--rad:14px;--sh:0 2px 16px rgba(0,0,0,.07)}
        
        .screen{display:none;max-width:600px;margin:0 auto;padding:20px;animation:fadeIn 0.4s ease-out}
        .screen.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* === DESIGN DES CARTES === */
        .card{background:var(--s);border-radius:var(--rad);padding:24px;box-shadow:var(--sh);border:1px solid var(--bd);margin-bottom:20px}
        h1{font-family:'Caveat',cursive;font-size:2.5rem;color:var(--g);text-align:center;margin-bottom:10px}
        p.intro{text-align:center;color:var(--t2);margin-bottom:30px}

        /* === FORMULAIRE === */
        label{display:block;margin-bottom:8px;font-weight:700;color:var(--t2)}
        input, select, textarea{width:100%;padding:12px;border-radius:10px;border:2px solid var(--bd);font-family:inherit;font-size:1rem;margin-bottom:20px;transition:border-color 0.2s}
        input:focus, select:focus{border-color:var(--gm);outline:none}

        /* === BOUTONS === */
        .btn{display:block;width:100%;padding:15px;border-radius:12px;border:none;background:var(--g);color:white;font-size:1.1rem;font-weight:800;cursor:pointer;transition:transform 0.1s, background 0.2s}
        .btn:hover{background:var(--gd)}
        .btn:active{transform:scale(0.98)}

        /* === CHAT === */
        #chat-box{height:300px;overflow-y:auto;border:1px solid var(--bd);border-radius:10px;padding:15px;background:#fcfaf7;margin-bottom:15px}
        .msg{margin-bottom:15px;max-width:85%;padding:12px;border-radius:15px;line-height:1.4}
        .msg.pro{background:var(--gl);color:var(--gd);align-self:flex-start;border-bottom-left-radius:2px}
        .msg.user{background:var(--bl);color:var(--b);margin-left:auto;border-bottom-right-radius:2px}

        /* === ALERTE === */
        #alert-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
        #alert-overlay.active{display:flex}
        .alert-box{background:white;padding:30px;border-radius:20px;max-width:400px;text-align:center}
    </style>
</head>
<body>

    <div id="screen-welcome" class="screen active">
        <h1>Bonjour !</h1>
        <p class="intro">Bienvenue dans l'atelier d'écriture de Mme Granger.</p>
        <div class="card">
            <label>Comment t'appelles-tu ?</label>
            <input type="text" id="input-name" placeholder="Ton prénom...">
            
            <label>Ton niveau :</label>
            <select id="select-level">
                <option value="CE1">CE1</option>
                <option value="CE2">CE2</option>
                <option value="CM1">CM1</option>
                <option value="CM2">CM2</option>
            </select>

            <button class="btn" onclick="startApp()">Commencer l'atelier</button>
        </div>
    </div>

    <div id="screen-app" class="screen">
        <h1 id="user-title">Atelier d'écriture</h1>
        <div class="card">
            <div id="chat-box">
                <div class="msg pro">Bonjour ! Je suis Mme Granger. Écris une phrase ou un petit texte, et je vais t'aider à l'améliorer.</div>
            </div>
            <textarea id="input-text" rows="3" placeholder="Écris ici..."></textarea>
            <button class="btn" id="btn-send" onclick="sendMessage()">Demander de l'aide</button>
            <button class="btn" style="background:#9e8c78; margin-top:10px;" onclick="resetApp()">Changer d'élève</button>
        </div>
    </div>

    <div id="alert-overlay">
        <div class="alert-box">
            <p id="alert-msg">Une erreur est survenue.</p>
            <button class="btn" style="margin-top:20px" onclick="closeAlert()">D'accord</button>
        </div>
    </div>

    <script>
        // --- ÉTAT DE L'APPLICATION ---
        let S = {
            name: "",
            level: "CE1",
            loading: false
        };

        // --- FONCTIONS DE NAVIGATION ---
        function startApp() {
            const name = document.getElementById('input-name').value.trim();
            if(!name) return alert("N'oublie pas d'entrer ton prénom !");
            
            S.name = name;
            S.level = document.getElementById('select-level').value;
            
            document.getElementById('user-title').textContent = "Atelier de " + S.name;
            showScreen('screen-app');
            saveState();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetApp() {
            localStorage.clear();
            location.reload();
        }

        // --- GESTION DES MESSAGES ---
        async function sendMessage() {
            const text = document.getElementById('input-text').value.trim();
            if(!text || S.loading) return;

            addMessage(text, 'user');
            document.getElementById('input-text').value = "";
            S.loading = true;
            document.getElementById('btn-send').textContent = "Mme Granger réfléchit...";

            try {
                const response = await fetch('/.netlify/functions/gemini', {
                    method: 'POST',
                    body: JSON.stringify({
                        prompt: `Tu es Mme Granger, une maîtresse bienveillante. Aide l'élève nommé ${S.name} (niveau ${S.level}) à améliorer ce texte : "${text}". Donne un conseil court et encourageant.`
                    })
                });

                const data = await response.json();
                if(data.answer) {
                    addMessage(data.answer, 'pro');
                } else {
                    addMessage("Oh, j'ai eu un petit souci. Peux-tu répéter ?", 'pro');
                }
            } catch (err) {
                addMessage("Je n'arrive pas à te répondre pour l'instant. Vérifie ta connexion.", 'pro');
            } finally {
                S.loading = false;
                document.getElementById('btn-send').textContent = "Demander de l'aide";
            }
        }

        function addMessage(txt, side) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${side}`;
            div.textContent = txt;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- SAUVEGARDE ET RESTAURATION ---
        function saveState() {
            localStorage.setItem('mme_granger_state', JSON.stringify(S));
        }

        function restoreState() {
            try {
                const saved = localStorage.getItem('mme_granger_state');
                if(saved) {
                    S = JSON.parse(saved);
                    if(S.name) {
                        document.getElementById('user-title').textContent = "Atelier de " + S.name;
                        showScreen('screen-app');
                    }
                }
            } catch(e) {
                console.error("Erreur de restauration");
                localStorage.clear();
            }
        }

        function closeAlert() {
            document.getElementById('alert-overlay').classList.remove('active');
        }

        // --- LANCEMENT ---
        window.onload = () => {
            // Si on demande un nettoyage via l'URL
            if(window.location.search.includes('clear=true')) {
                localStorage.clear();
                window.history.replaceState({}, document.title, "/");
            }
            restoreState();
        };
    </script>
</body>
</html>
