<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord — Professeur</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#5b4fcf;--a:#3b82f6;--g:#10b981;--o:#f97316;--r:#ef4444;
  --bg:#f0f4f8;--w:#fff;--t:#1a2035;--s:#64748b;--rad:14px;--sh:0 4px 20px rgba(59,80,180,.09)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;font-size:15px;background:var(--bg);color:var(--t);padding:24px}
.wrap{max-width:1100px;margin:0 auto}
/* Auth */
#auth{max-width:400px;margin:80px auto}
.auth-box{background:var(--w);border-radius:var(--rad);box-shadow:var(--sh);padding:36px 32px;text-align:center}
.auth-box h2{font-size:1.4rem;font-weight:800;color:var(--p);margin-bottom:8px}
.auth-box p{color:var(--s);font-size:.9rem;margin-bottom:24px}
.ai{width:100%;padding:13px 15px;border:2px solid #e5e7eb;border-radius:10px;
  font-family:'Nunito',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;margin-bottom:12px}
.ai:focus{border-color:var(--p)}
.ab{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--a));color:#fff;border:none;
  border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer}
.ab:hover{opacity:.92}
.aerr{color:var(--r);font-size:.85rem;margin-top:8px;display:none}
/* Dashboard */
#dash{display:none}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.dh h1{font-size:1.5rem;font-weight:800;color:var(--p)}
.dh small{display:block;color:var(--s);font-size:.85rem;margin-top:2px}
.cbadge{background:var(--p);color:#fff;padding:6px 16px;border-radius:20px;font-size:.82rem;font-weight:700}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--w);border-radius:var(--rad);box-shadow:var(--sh);padding:18px 20px;border-left:4px solid var(--p)}
.sc .v{font-size:2rem;font-weight:900;color:var(--p)}.sc .l{font-size:.8rem;color:var(--s);margin-top:2px}
.sc.g{border-left-color:var(--g)}.sc.g .v{color:var(--g)}
.sc.o{border-left-color:var(--o)}.sc.o .v{color:var(--o)}
.sc.r{border-left-color:var(--r)}.sc.r .v{color:var(--r)}
/* Filters */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filters label{font-weight:700;font-size:.85rem;color:var(--p)}
.filters select,.filters input{padding:8px 12px;border:2px solid #e5e7eb;border-radius:8px;
  font-family:'Nunito',sans-serif;font-size:.88rem;outline:none}
.filters select:focus,.filters input:focus{border-color:var(--p)}
.btn{padding:8px 16px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;
  font-size:.88rem;font-weight:700;cursor:pointer;transition:transform .15s}
.btn:hover{transform:translateY(-1px)}
.btn-p{background:var(--p);color:#fff}
.btn-g{background:var(--g);color:#fff}
/* Loading */
.loading{text-align:center;padding:50px;color:var(--s);font-size:1rem}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e5e7eb;
  border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Students */
.grid{display:grid;gap:10px}
.sc2{background:var(--w);border-radius:var(--rad);box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.sc2:hover{box-shadow:0 6px 24px rgba(59,80,180,.15)}
.sh2{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid #f1f5f9}
.sav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--a));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.95rem;flex-shrink:0}
.sname{font-weight:800;font-size:.95rem}.smeta{font-size:.75rem;color:var(--s)}
.sbadges{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{padding:3px 9px;border-radius:12px;font-size:.7rem;font-weight:700}
.bn{background:#ede9fe;color:var(--p)}.bd{background:#fff7ed;color:var(--o)}
.bl{background:#ecfdf5;color:var(--g)}.ba{background:#eff6ff;color:var(--a)}
.sbody{padding:16px 18px;display:none}
.sc2.open .sbody{display:block}
/* Metrics */
.mrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px}
.mc{background:#f8fafc;border-radius:8px;padding:10px 12px;text-align:center}
.mc .mv{font-size:1.3rem;font-weight:900;color:var(--p)}.mc .ml{font-size:.7rem;color:var(--s);margin-top:2px}
/* Difficultés / Progrès */
.dsec{margin-top:10px}
.dtitle{font-weight:700;font-size:.83rem;color:var(--r);margin-bottom:5px}
.di{background:#fff5f5;border-left:3px solid var(--r);border-radius:5px;padding:7px 11px;
  font-size:.8rem;margin-bottom:5px;line-height:1.5}
.ptitle{font-weight:700;font-size:.83rem;color:var(--g);margin-bottom:5px;margin-top:10px}
.pi{background:#f0fdf4;border-left:3px solid var(--g);border-radius:5px;padding:7px 11px;
  font-size:.8rem;margin-bottom:5px;line-height:1.5}
/* Logs */
.htitle{font-weight:700;font-size:.82rem;color:var(--s);margin:12px 0 8px;text-transform:uppercase;letter-spacing:.04em}
.le{display:flex;gap:8px;margin-bottom:8px;font-size:.82rem}
.lt{color:var(--s);flex-shrink:0;font-size:.72rem;min-width:65px;padding-top:3px}
.lu{background:#d1fae5;border-radius:7px;padding:5px 9px;flex:1;line-height:1.5}
.lia{background:#eef0fb;border-radius:7px;padding:5px 9px;flex:2;line-height:1.5;font-size:.78rem}
/* Roman */
.rsec{margin-top:10px;background:#ecfdf5;border-radius:8px;padding:11px 14px}
.rsec h4{color:#065f46;font-size:.83rem;font-weight:700;margin-bottom:5px}
.rsec p{font-size:.8rem;color:#065f46;line-height:1.6;white-space:pre-wrap}
/* Empty */
.empty{text-align:center;padding:50px;color:var(--s)}
.empty .ico{font-size:2.5rem;margin-bottom:10px}
</style>
</head>
<body>
<div class="wrap">

<!-- AUTH -->
<div id="auth">
  <div class="auth-box">
    <div style="font-size:2.2rem;margin-bottom:10px">🔐</div>
    <h2>Espace Professeur</h2>
    <p>Accès réservé — entrez le mot de passe enseignant</p>
    <input type="password" id="pwd" class="ai" placeholder="Mot de passe"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <button class="ab" onclick="checkAuth()">Accéder au tableau de bord</button>
    <div id="aerr" class="aerr">Mot de passe incorrect.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="dh">
    <div>
      <h1>📊 Tableau de bord — Atelier d'Écriture</h1>
      <small id="last-update">Chargement des données...</small>
    </div>
    <span class="cbadge">🔐 Connecté</span>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <label>Filtrer :</label>
    <select id="fl" onchange="applyFilters()">
      <option value="">Tous niveaux</option>
      <option value="6eme">6ème</option><option value="5eme">5ème</option>
      <option value="4eme">4ème</option><option value="3eme">3ème</option>
    </select>
    <select id="fd" onchange="applyFilters()">
      <option value="">Tous profils</option>
      <option value="1">DYS</option><option value="0">Sans DYS</option>
    </select>
    <input type="text" id="fs" placeholder="Rechercher..." oninput="applyFilters()">
    <button class="btn btn-p" onclick="loadData()">🔄 Actualiser</button>
    <button class="btn btn-g" onclick="exportCSV()">📥 CSV</button>
  </div>

  <div id="main-content">
    <div class="loading"><div class="spinner"></div><br>Chargement depuis Supabase...</div>
  </div>
</div>

</div>

<script>
const PROF_PWD = "granger2024"; // ← Changer ici
const SB_URL  = "https://sctfzwqqlmjprodszsrv.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjdGZ6d3FxbG1qcHJvZHN6c3J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjQzMjYsImV4cCI6MjA5MjU0MDMyNn0.2XN0OE81vAyD_seiPnHrC9BZIEbzcCvLdiMeH_qXBlc";

let allStudents = [];
let allLogs = [];

function checkAuth() {
  if (document.getElementById('pwd').value === PROF_PWD) {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadData();
  } else {
    document.getElementById('aerr').style.display = 'block';
  }
}

async function sbGet(path) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  if (!res.ok) throw new Error('Supabase ' + res.status);
  return res.json();
}

async function loadData() {
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>Chargement depuis Supabase...</div>';
  try {
    const [sessions, logs] = await Promise.all([
      sbGet('sessions?select=*&order=updated_at.desc'),
      sbGet('logs?select=*&order=created_at.desc')
    ]);
    allStudents = sessions;
    allLogs = logs;
    document.getElementById('last-update').textContent =
      'Dernière actualisation : ' + new Date().toLocaleTimeString('fr-FR') +
      ' · ' + sessions.length + ' élève(s) · ' + logs.length + ' échange(s)';
    renderStats();
    applyFilters();
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><div class="ico">⚠️</div><p>Erreur de connexion à Supabase.<br><small>${e.message}</small></p></div>`;
  }
}

function renderStats() {
  const s = allStudents;
  document.getElementById('stats').innerHTML = `
    <div class="sc"><div class="v">${s.length}</div><div class="l">Élèves enregistrés</div></div>
    <div class="sc g"><div class="v">${s.filter(x=>x.mode_livre).length}</div><div class="l">En Mode Livre</div></div>
    <div class="sc o"><div class="v">${s.filter(x=>x.dys).length}</div><div class="l">Profil DYS</div></div>
    <div class="sc r"><div class="v">${s.filter(x=>x.nb_echanges<3).length}</div><div class="l">Peu actifs</div></div>
    <div class="sc"><div class="v">${allLogs.length}</div><div class="l">Échanges total</div></div>
  `;
}

function applyFilters() {
  const fl = document.getElementById('fl').value;
  const fd = document.getElementById('fd').value;
  const fs = document.getElementById('fs').value.toLowerCase();
  let list = allStudents;
  if (fl) list = list.filter(s => s.level === fl);
  if (fd === '1') list = list.filter(s => s.dys);
  if (fd === '0') list = list.filter(s => !s.dys);
  if (fs) list = list.filter(s => s.username.toLowerCase().includes(fs));
  renderStudents(list);
}

function renderStudents(students) {
  const lvl = {"6eme":"6ème","5eme":"5ème","4eme":"4ème","3eme":"3ème"};
  if (!students.length) {
    document.getElementById('main-content').innerHTML =
      '<div class="empty"><div class="ico">🔍</div><p>Aucun élève trouvé.</p></div>';
    return;
  }

  const html = students.map((s, i) => {
    const logs = allLogs.filter(l => l.username === s.username)
      .sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
      .slice(0, 5);

    const allLg = allLogs.filter(l => l.username === s.username);
    const iaText = allLg.map(l => l.ia_msg||'').join(' ').toLowerCase();
    const diff = [], prog = [];

    if ((iaText.match(/sans verbe|verbe principal|phrase incomplète/g)||[]).length >= 2)
      diff.push("Phrases sans verbe conjugué (récurrent)");
    if ((iaText.match(/majuscule|ponctuation|point en fin/g)||[]).length >= 2)
      diff.push("Ponctuation de base non maîtrisée");
    if ((iaText.match(/registre oral|onomatopée|trop familier/g)||[]).length >= 1)
      diff.push("Registre oral dans l'écrit");
    if ((iaText.match(/concordance|temps verbal|imparfait|passé simple/g)||[]).length >= 2)
      diff.push("Concordance des temps");
    if ((iaText.match(/verbe d'action|verbe expressif/g)||[]).length >= 1)
      prog.push("Travail sur les verbes d'action engagé");
    if (s.mode_livre) prog.push("🎉 Mode Livre activé — niveau confirmé");
    if (s.nb_echanges >= 10) prog.push("Bonne assiduité : " + s.nb_echanges + " échanges");

    const lastDate = s.updated_at ? new Date(s.updated_at).toLocaleDateString('fr-FR') : '—';
    const init = (s.username||'?')[0].toUpperCase();

    const logsHtml = logs.length === 0
      ? '<p style="color:var(--s);font-size:.8rem">Aucun échange.</p>'
      : logs.map(l => `<div class="le">
          <div class="lt">${new Date(l.created_at).toLocaleDateString('fr-FR')}</div>
          <div class="lu">😊 ${esc(l.user_msg)}</div>
          <div class="lia">🤖 ${esc((l.ia_msg||'').slice(0,200))}</div>
        </div>`).join('');

    return `<div class="sc2" id="sc${i}">
      <div class="sh2" onclick="tog(${i})">
        <div class="sav">${init}</div>
        <div>
          <div class="sname">${esc(s.username)}</div>
          <div class="smeta">${s.nb_echanges||0} échanges · Dernière session : ${lastDate}</div>
        </div>
        <div class="sbadges">
          <span class="badge bn">${lvl[s.level]||s.level}</span>
          ${s.dys?'<span class="badge bd">🧩 DYS</span>':''}
          ${s.mode_livre?'<span class="badge bl">📖 Livre</span>':''}
          ${(s.nb_echanges||0)>=5?'<span class="badge ba">✅ Actif</span>':''}
        </div>
      </div>
      <div class="sbody">
        <div class="mrow">
          <div class="mc"><div class="mv">${s.nb_echanges||0}</div><div class="ml">Échanges</div></div>
          <div class="mc"><div class="mv">${diff.length}</div><div class="ml">Difficultés</div></div>
          <div class="mc"><div class="mv">${allLg.length}</div><div class="ml">Logs total</div></div>
          <div class="mc"><div class="mv">${s.mode_livre?'📖':'✍️'}</div><div class="ml">${s.mode_livre?'Livre':'Atelier'}</div></div>
        </div>
        ${diff.length?`<div class="dsec"><div class="dtitle">⚠️ Difficultés détectées</div>${diff.map(d=>`<div class="di">${d}</div>`).join('')}</div>`:''}
        ${prog.length?`<div class="dsec"><div class="ptitle">✅ Progrès</div>${prog.map(p=>`<div class="pi">${p}</div>`).join('')}</div>`:''}
        ${s.mode_livre&&s.livre_plan?`<div class="rsec"><h4>📖 Plan du roman</h4><p>${esc(s.livre_plan)}</p></div>`:''}
        <div class="htitle">5 derniers échanges</div>
        ${logsHtml}
      </div>
    </div>`;
  }).join('');

  document.getElementById('main-content').innerHTML = `<div class="grid">${html}</div>`;
}

function tog(i) { document.getElementById('sc'+i).classList.toggle('open'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function exportCSV() {
  const rows = [['Pseudo','Niveau','DYS','Mode Livre','Échanges','Dernière session']];
  for (const s of allStudents) {
    rows.push([s.username, s.level, s.dys?'Oui':'Non', s.mode_livre?'Oui':'Non',
      s.nb_echanges||0, s.updated_at ? new Date(s.updated_at).toLocaleDateString('fr-FR') : '—']);
  }
  const csv = rows.map(r => r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'atelier_rapport_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
</body>
</html>
